name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Queue deploys instead of cancelling mid-run (avoids stuck "cancelling" jobs on GitHub).
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify Playfield SDK is vendored
        run: test -f playfield/packages/core/package.json

      - name: Install Playfield dependencies
        working-directory: playfield
        run: npm ci

      - name: Install Tripoley dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build for GitHub Pages
        run: npm run build

      - name: Verify GitHub Pages build output
        run: grep -q '/tripoley/assets/' dist/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    name: deploy
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment
